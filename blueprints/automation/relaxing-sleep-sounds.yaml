blueprint:
  name: Relaxing Sleep Sounds
  description: >
    Plays a track at a start time, monitors the player to restart it if it stops
    during the night, and stops it at a set end time.
  domain: automation
  input:
    media:
      name: Media
      description: Choose the media player and track.
      selector:
        media: {}
    time_start:
      name: Start Time
      description: Time to begin playing each evening.
      selector:
        time: {}
    time_stop:
      name: Stop Time
      description: Time to stop playing in the morning.
      selector:
        time: {}
    target_volume:
      name: Volume
      default: 0.4
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.01
    thumbnail_url:
      name: Thumbnail URL
      description: >
        Optional image URL shown on the media player display while playing
        (e.g. a raw.githubusercontent.com link to a PNG or JPG).
        Leave blank to show no image.
      default: ""
      selector:
        text: {}
    do_start:
      name: Auto-Start
      description: Automatically start the relaxing sounds at the beginning of the time slot.
      default: true
      selector:
        boolean: {}
    do_restart:
      name: Auto-Restart
      description: Automatically restart the sound if it stops during the night.
      default: true
      selector:
        boolean: {}

variables:
  media_input: !input media
  media_entity: "{{ media_input.entity_id }}"
  media_content: "{{ media_input.media_content_id }}"
  media_type: "{{ media_input.media_content_type }}"
  thumbnail: !input thumbnail_url
  do_start: !input do_start
  do_restart: !input do_restart

trigger:
  # Trigger 1: The Clock hits Start Time
  - platform: time
    at: !input time_start
    id: start

  # Trigger 2: Monitor player stops/idles
  - platform: state
    domain: media_player
    to:
      - idle
      - "off"
    for:
      seconds: 5
    id: restart

  # Trigger 3: The Clock hits Stop Time
  - platform: time
    at: !input time_stop
    id: stop

action:
  - choose:
      # --- START Logic ---
      - conditions:
          - condition: trigger
            id: start
          - condition: template
            value_template: "{{ do_start }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ media_entity }}"
            data:
              volume_level: !input target_volume
          - service: media_player.play_media
            target:
              entity_id: "{{ media_entity }}"
            data:
              media_content_id: "{{ media_content }}"
              media_content_type: "{{ media_type }}"
              metadata:
                thumbnail: "{{ thumbnail }}"
          - service: media_player.repeat_set
            target:
              entity_id: "{{ media_entity }}"
            data:
              repeat: one

      # --- RESTART Logic ---
      - conditions:
          - condition: trigger
            id: restart
          - condition: template
            value_template: "{{ do_restart }}"
          - condition: template
            value_template: >
              {{ trigger.entity_id == media_entity }}
          - condition: time
            after: !input time_start
            before: !input time_stop
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ media_entity }}"
            data:
              volume_level: !input target_volume
          - service: media_player.play_media
            target:
              entity_id: "{{ media_entity }}"
            data:
              media_content_id: "{{ media_content }}"
              media_content_type: "{{ media_type }}"
              metadata:
                thumbnail: "{{ thumbnail }}"
          - service: media_player.repeat_set
            target:
              entity_id: "{{ media_entity }}"
            data:
              repeat: one

      # --- STOP Logic ---
      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ is_state(media_entity, 'playing') and
                     state_attr(media_entity, 'media_content_id') == media_content }}
            then:
              - service: media_player.media_stop
                target:
                  entity_id: "{{ media_entity }}"

mode: restart
