blueprint:
  name: Relaxing Sleep Sounds
  description: >
    Plays a looping track on a media player at a set start time (if nothing
    is already playing), restarts it if it stops during the night window, and stops
    it at the set end time — but only if the blueprint's own track is still playing.

    Requires no third-party integrations — uses only native Home Assistant services.
  domain: automation
  input:
    media:
      name: Media
      description: Choose the media player and track to play.
      selector:
        media: {}

    time_start:
      name: Start Time
      description: Time to begin playing each evening.
      selector:
        time: {}

    time_stop:
      name: Stop Time
      description: Time to stop playing in the morning.
      selector:
        time: {}

    target_volume:
      name: Volume
      description: Playback volume level.
      default: 0.4
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.01
          mode: slider

    thumbnail_url:
      name: Thumbnail URL
      description: >
        Optional image URL shown on the media player display while playing
        (e.g. a raw.githubusercontent.com link to a PNG or JPG).
        Leave blank to show no image.
      default: ""
      selector:
        text: {}

variables:
  media: !input media
  thumbnail_url: !input thumbnail_url

trigger:
  - platform: time
    at: !input time_start
    id: start

  - platform: state
    entity_id: !input media
    to:
      - idle
      - "off"
    for:
      seconds: 5
    id: restart

  - platform: time
    at: !input time_stop
    id: stop

condition: []

action:
  - choose:
      # ── START: play if not already playing ───────────────────────────────────
      - conditions:
          - condition: trigger
            id: start
        sequence:
          - if:
              - condition: template
                value_template: "{{ not is_state(media.entity_id, 'playing') }}"
            then:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ media.entity_id }}"
                data:
                  volume_level: !input target_volume

              - service: media_player.play_media
                target:
                  entity_id: "{{ media.entity_id }}"
                data:
                  media:
                    media_content_id: "{{ media.media_content_id }}"
                    media_content_type: "{{ media.media_content_type }}"
                    metadata:
                      thumbnail: "{{ thumbnail_url }}"

              - service: media_player.repeat_set
                target:
                  entity_id: "{{ media.entity_id }}"
                data:
                  repeat: one

      # ── RESTART: resume if stopped during the night window ───────────────────
      - conditions:
          - condition: trigger
            id: restart
          - condition: time
            after: !input time_start
            before: !input time_stop
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ media.entity_id }}"
            data:
              volume_level: !input target_volume

          - service: media_player.play_media
            target:
              entity_id: "{{ media.entity_id }}"
            data:
              media:
                media_content_id: "{{ media.media_content_id }}"
                media_content_type: "{{ media.media_content_type }}"
                metadata:
                  thumbnail: "{{ thumbnail_url }}"

          - service: media_player.repeat_set
            target:
              entity_id: "{{ media.entity_id }}"
            data:
              repeat: one

      # ── STOP: stop only if the blueprint's own track is still playing ────────
      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ states(media.entity_id) == 'playing' and
                     state_attr(media.entity_id, 'media_content_id') == media.media_content_id }}
            then:
              - service: media_player.media_stop
                target:
                  entity_id: "{{ media.entity_id }}"

mode: queued
