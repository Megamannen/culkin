substitutions:
  name: "attic-ventilation"
  friendly_name: "Attic Ventilation"
  mode_normal: "Normal"
  mode_away: "Bortaläge"
  mode_overpressure: "Braskamin/köksfläkt"
  mode_max: "Maxflöde"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: true
  project:
    name: "culkin.attic_ventilation"
    version: "1.0"
  platformio_options:
    board_upload.maximum_size: 4194304
  min_version: "2024.3.2" # Fix logger compile error on ESP32-C6 esphome#6323
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            ESP_LOGD("custom", "Custom component for external antenna initialization.");
            gpio_reset_pin(GPIO_NUM_3);
            gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_3, 0); // Activate RF switch control

            vTaskDelay(pdMS_TO_TICKS(100));

            gpio_reset_pin(GPIO_NUM_14);
            gpio_set_direction(GPIO_NUM_14, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_14, 1); // Use external antenna
    # Re-apply the restored mode so the relays match the select after boot
    - priority: -100
      then:
        - select.set:
            id: ventilation_mode
            option: !lambda 'return id(ventilation_mode).state;'

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  flash_size: 4MB # upload.flash_size
  framework:
    type: esp-idf

# Enable logging
logger:
  level: WARN  # Set log level to DEBUG, INFO, WARN, ERROR, or CRITICAL
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable over-the-air updates
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case Wi-Fi connection fails
  ap:
    ssid: "attic-ventilation"

captive_portal:

web_server:
  port: 80

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

# i2c bus reserved for a future sensor - no consumers yet.
# i2c:
#   sda: GPIO22
#   scl: GPIO23
#   scan: true
#   id: bus_a

# Relays are internal and mutually interlocked - only one ever energized.
# They are driven by the "Mode" select below, not exposed to Home Assistant.
switch:
  - platform: gpio
    id: sw_bortalage
    pin: GPIO2
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: &interlock_group [sw_bortalage, sw_braskamin, sw_maxflode]
    interlock_wait_time: &interlock_wait 250ms
  - platform: gpio
    id: sw_braskamin
    pin: GPIO21
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: *interlock_wait
  - platform: gpio
    id: sw_maxflode
    pin: GPIO1
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *interlock_group
    interlock_wait_time: *interlock_wait
#  - platform: gpio
#    id: relay4
#    pin: GPIO0
#  - platform: gpio
#    id: relay5
#    pin: GPIO19
#  - platform: gpio
#    id: relay6
#    pin: GPIO18

# Single exposed entity: pick a ventilation mode. Each active mode energizes
# exactly one relay; Normal turns all off. Interlock breaks before make (250ms).
select:
  - platform: template
    name: "Mode"
    id: ventilation_mode
    optimistic: true
    restore_value: true
    options:
      - "${mode_normal}"
      - "${mode_away}"
      - "${mode_overpressure}"
      - "${mode_max}"
    set_action:
      - lambda: |-
          if (x == "${mode_away}") {
            id(sw_bortalage).turn_on();
          } else if (x == "${mode_overpressure}") {
            id(sw_braskamin).turn_on();
          } else if (x == "${mode_max}") {
            id(sw_maxflode).turn_on();
          } else {
            id(sw_bortalage).turn_off();
            id(sw_braskamin).turn_off();
            id(sw_maxflode).turn_off();
          }